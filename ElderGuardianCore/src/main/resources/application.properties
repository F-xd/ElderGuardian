spring.application.name=ElderGuardianCore
# web服务器端口配置
server.port=8080

# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/elder_guardian_core?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=fxd12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 显示SQL语句
# spring.jpa.show-sql=true

# 格式化SQL语句
spring.jpa.properties.hibernate.format_sql=true

# 数据库表自动更新策略
spring.jpa.hibernate.ddl-auto=update

# 文件上传大小限制
# 单个文件最大10MB
spring.servlet.multipart.max-file-size=10MB
# 请求总大小最大10MB
spring.servlet.multipart.max-request-size=10MB

# 阿里云AMQP配置
aliyun.amqp.access-key=${ALIYUN_ACCESS_KEY_ID}
aliyun.amqp.access-secret=${ALIYUN_ACCESS_KEY_SECRET}
aliyun.amqp.consumer-group-id=DEFAULT_GROUP
aliyun.amqp.host=iot-06z00hax6b0i8g0.amqp.iothub.aliyuncs.com
aliyun.amqp.port=5671
aliyun.amqp.iot-instance-id=iot-06z00hax6b0i8g0